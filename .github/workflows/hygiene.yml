name: hygiene

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install ripgrep (the scan's secret sweep uses rg)
        run: sudo apt-get update -q && sudo apt-get install -y -q ripgrep
      - run: scripts/hygiene_scan.sh
