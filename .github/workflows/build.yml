name: build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  wheel:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip build
      - run: python -m build
      - run: scripts/fresh_venv_smoke.sh
