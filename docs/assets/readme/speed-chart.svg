<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Throughput comparison: 28 TPS without MTP, 63 TPS with MTPLX, 2.24x speedup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0e14"/>
      <stop offset="100%" stop-color="#06060a"/>
    </linearGradient>
    <linearGradient id="loFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#82827a"/>
      <stop offset="100%" stop-color="#34343a"/>
    </linearGradient>
    <linearGradient id="loTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bdbdb6"/>
      <stop offset="100%" stop-color="#6c6c66"/>
    </linearGradient>
    <linearGradient id="loRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3c3c3a"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>
    <linearGradient id="hiFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0e9"/>
      <stop offset="55%" stop-color="#bcbcb4"/>
      <stop offset="100%" stop-color="#6c6c64"/>
    </linearGradient>
    <linearGradient id="hiTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfbfb8"/>
    </linearGradient>
    <linearGradient id="hiRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a55"/>
      <stop offset="100%" stop-color="#1c1c1a"/>
    </linearGradient>
    <linearGradient id="chromeText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#cdcdc6"/>
      <stop offset="100%" stop-color="#7e7e76"/>
    </linearGradient>
    <linearGradient id="dimText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cdcdc6"/>
      <stop offset="100%" stop-color="#7e7e76"/>
    </linearGradient>
    <filter id="textDepth">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- card background -->
  <rect x="20" y="20" width="1160" height="600" rx="22" fill="url(#bg)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <line x1="20" y1="20" x2="1180" y2="20" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- gridlines -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="170" y1="120" x2="1140" y2="120"/>
    <line x1="170" y1="220" x2="1140" y2="220"/>
    <line x1="170" y1="320" x2="1140" y2="320"/>
    <line x1="170" y1="420" x2="1140" y2="420"/>
  </g>

  <!-- baseline -->
  <line x1="170" y1="495" x2="1140" y2="495" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>

  <!-- y-axis labels -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#666" letter-spacing="1.5">
    <text x="148" y="124" text-anchor="end">80 TPS</text>
    <text x="148" y="224" text-anchor="end">60</text>
    <text x="148" y="324" text-anchor="end">40</text>
    <text x="148" y="424" text-anchor="end">20</text>
    <text x="148" y="499" text-anchor="end">0</text>
  </g>

  <!-- speedup pill top right -->
  <g transform="translate(960, 50)">
    <rect x="0" y="0" width="180" height="46" rx="23" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <text x="20" y="29" font-family="ui-monospace, monospace" font-size="11" fill="#888" letter-spacing="3">SPEEDUP</text>
    <text x="160" y="30" text-anchor="end" font-family="Inter, sans-serif" font-weight="700" font-size="18" fill="url(#chromeText)" letter-spacing="-1">2.24×</text>
  </g>

  <!-- LO bar (28 TPS): scale = 80 TPS over 380px (110→490). 28/80*380 = 133. top y = 495-133 = 362. -->
  <!-- Front: x=360-560, y=362-495. Depth=24. -->
  <g>
    <!-- right face: M(560,362) L(584,338) L(584,471) L(560,495) -->
    <path d="M 560 362 L 584 338 L 584 471 L 560 495 Z" fill="url(#loRight)"/>
    <!-- top face: M(360,362) L(384,338) L(584,338) L(560,362) -->
    <path d="M 360 362 L 384 338 L 584 338 L 560 362 Z" fill="url(#loTop)"/>
    <!-- front face -->
    <rect x="360" y="362" width="200" height="133" fill="url(#loFront)"/>
    <!-- top edge highlight -->
    <line x1="360" y1="363" x2="560" y2="363" stroke="rgba(255,255,255,0.30)" stroke-width="1"/>
  </g>

  <!-- HI bar (63 TPS): 63/80*380 = 299. top y = 495-299 = 196. -->
  <!-- Front: x=760-960, y=196-495. -->
  <g>
    <path d="M 960 196 L 984 172 L 984 471 L 960 495 Z" fill="url(#hiRight)"/>
    <path d="M 760 196 L 784 172 L 984 172 L 960 196 Z" fill="url(#hiTop)"/>
    <rect x="760" y="196" width="200" height="299" fill="url(#hiFront)"/>
    <line x1="760" y1="197" x2="960" y2="197" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
  </g>

  <!-- LO TPS label above bar (cube visual center: x=472) -->
  <g font-family="Inter, sans-serif" font-weight="700" letter-spacing="-2" filter="url(#textDepth)">
    <text x="472" y="306" text-anchor="middle" font-size="56" fill="url(#dimText)">28</text>
    <text x="528" y="306" font-size="14" fill="#666" letter-spacing="2" font-weight="500">TPS</text>
  </g>

  <!-- HI TPS label above bar (cube visual center: x=872) -->
  <g font-family="Inter, sans-serif" font-weight="700" letter-spacing="-2" filter="url(#textDepth)">
    <text x="872" y="140" text-anchor="middle" font-size="56" fill="url(#chromeText)">63</text>
    <text x="928" y="140" font-size="14" fill="#aaa" letter-spacing="2" font-weight="500">TPS</text>
  </g>

  <!-- x-axis labels (under bars) -->
  <g font-family="ui-monospace, monospace" letter-spacing="3.5">
    <text x="472" y="540" text-anchor="middle" font-size="13" font-weight="700" fill="#cdcdc6">WITHOUT MTP</text>
    <text x="472" y="562" text-anchor="middle" font-size="11" fill="#666" letter-spacing="0.5" font-family="Inter, sans-serif" font-weight="400">baseline TPS</text>

    <text x="872" y="540" text-anchor="middle" font-size="13" font-weight="700" fill="#efefe9">WITH MTPLX</text>
    <text x="872" y="562" text-anchor="middle" font-size="11" fill="#666" letter-spacing="0.5" font-family="Inter, sans-serif" font-weight="400">native MTP</text>
  </g>

  <!-- footer caption -->
  <line x1="170" y1="592" x2="1140" y2="592" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="600" y="608" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#56564f" letter-spacing="3">QWEN3.6-27B  ·  D3  ·  TARGET TEMP 0.6 / TOP_P 0.95 / TOP_K 20</text>
</svg>
